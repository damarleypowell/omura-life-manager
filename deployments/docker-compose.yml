version: "3.9"

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: omura-db
    environment:
      POSTGRES_USER: omura
      POSTGRES_PASSWORD: omura
      POSTGRES_DB: omura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omura"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: omura-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: omura-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://omura:omura@postgres:5432/omura
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: omura-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
